<!DOCTYPE html>
<html>
<head>
  <title>Voice Note - Recording</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container { text-align: center; padding: 32px; max-width: 400px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
    .mic-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: #1e293b; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 24px; font-size: 36px;
      border: 2px solid #334155;
    }
    .mic-icon.recording {
      background: rgba(239, 68, 68, 0.15);
      border-color: #ef4444;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 16px rgba(239, 68, 68, 0); }
    }
    .timer { font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums; margin-bottom: 24px; }
    .status { font-size: 14px; color: #94a3b8; margin-bottom: 24px; min-height: 20px; }
    .error { color: #ef4444; }
    .btn {
      padding: 12px 32px; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-record { background: #10b981; color: white; }
    .btn-record:hover { background: #059669; }
    .btn-stop { background: #ef4444; color: white; }
    .btn-stop:hover { background: #dc2626; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .done { color: #10b981; }
  </style>
</head>
<body>
  <div class="container">
    <div class="mic-icon" id="micIcon">🎙️</div>
    <h1 id="heading">Voice Note</h1>
    <p class="subtitle" id="subtitle">Ready to record</p>
    <div class="timer" id="timer">0:00</div>
    <p class="status" id="status"></p>
    <button class="btn btn-record" id="actionBtn">Start Recording</button>
  </div>
  <script src="./index.ts" type="module"></script>
</body>
</html>
