                    - link "[1]" [ref=e196] [cursor=pointer]:
                      - /url: "#cite_note-ninds1-1"
              - row "Frequency 3–7%[2][5]" [ref=e197]:
                - rowheader "Frequency" [ref=e198]
                - cell "3–7%[2][5]" [ref=e199]:
                  - text: 3–7%
                  - superscript [ref=e200]:
                    - link "[2]" [ref=e201] [cursor=pointer]:
                      - /url: "#cite_note-Lancet2012-2"
                  - superscript [ref=e202]:
                    - link "[5]" [ref=e203] [cursor=pointer]:
                      - /url: "#cite_note-Koo2013-5"
          - paragraph [ref=e204]:
            - text: Dyslexia, also known as "word blindness", is a
            - link "learning disability" [ref=e205] [cursor=pointer]:
              - /url: /wiki/Learning_disability
            - text: that affects either reading or writing.
            - superscript [ref=e206]:
              - link "[1]" [ref=e207] [cursor=pointer]:
                - /url: "#cite_note-ninds1-1"
            - superscript [ref=e208]:
              - link "[6]" [ref=e209] [cursor=pointer]:
                - /url: "#cite_note-6"
            - text: Different people are affected to different degrees.
            - superscript [ref=e210]:
              - link "[3]" [ref=e211] [cursor=pointer]:
                - /url: "#cite_note-NIH2014Def-3"
            - text: Problems may include difficulties in spelling words, reading quickly, writing words, "sounding out" words
            - link "in the head" [ref=e212] [cursor=pointer]:
              - /url: /wiki/Subvocalization
            - text: ", pronouncing words when reading aloud and understanding what one reads."
            - superscript [ref=e213]:
              - link "[3]" [ref=e214] [cursor=pointer]:
                - /url: "#cite_note-NIH2014Def-3"
            - superscript [ref=e215]:
              - link "[7]" [ref=e216] [cursor=pointer]:
                - /url: "#cite_note-7"
            - text: Often these difficulties are first noticed at school.
            - superscript [ref=e217]:
              - link "[2]" [ref=e218] [cursor=pointer]:
                - /url: "#cite_note-Lancet2012-2"
            - text: The difficulties are involuntary, and people with this disorder have a normal desire to learn.
            - superscript [ref=e219]:
              - link "[3]" [ref=e220] [cursor=pointer]:
                - /url: "#cite_note-NIH2014Def-3"
            - text: People with dyslexia have higher rates of
            - link "attention deficit hyperactivity disorder" [ref=e221] [cursor=pointer]:
              - /url: /wiki/Attention_deficit_hyperactivity_disorder
            - text: (ADHD),
            - link "developmental language disorders" [ref=e222] [cursor=pointer]:
              - /url: /wiki/Developmental_language_disorder
            - text: ", and"
            - link "difficulties with numbers" [ref=e223] [cursor=pointer]:
              - /url: /wiki/Dyscalculia
            - text: .
            - superscript [ref=e224]:
              - link "[2]" [ref=e225] [cursor=pointer]:
                - /url: "#cite_note-Lancet2012-2"
            - superscript [ref=e226]:
              - link "[8]" [ref=e227] [cursor=pointer]:
                - /url: "#cite_note-8"
          - paragraph [ref=e228]:
            - text: Dyslexia is believed to be caused by the
            - link "interaction" [ref=e229] [cursor=pointer]:
              - /url: /wiki/Gene%E2%80%93environment_interaction
            - text: of
            - link "genetic" [ref=e230] [cursor=pointer]:
              - /url: /wiki/Genetics
            - text: and environmental factors.
            - superscript [ref=e231]:
              - link "[2]" [ref=e232] [cursor=pointer]:
                - /url: "#cite_note-Lancet2012-2"
            - text: Some cases run in families.
            - superscript [ref=e233]:
              - link "[3]" [ref=e234] [cursor=pointer]:
                - /url: "#cite_note-NIH2014Def-3"
            - text: Dyslexia that develops due to a
            - link "traumatic brain injury" [ref=e235] [cursor=pointer]:
              - /url: /wiki/Traumatic_brain_injury
            - text: ","
            - link "stroke" [ref=e236] [cursor=pointer]:
              - /url: /wiki/Stroke
            - text: ", or"
            - link "dementia" [ref=e237] [cursor=pointer]:
              - /url: /wiki/Dementia
            - text: is sometimes called "acquired dyslexia"
            - superscript [ref=e238]:
              - link "[1]" [ref=e239] [cursor=pointer]:
                - /url: "#cite_note-ninds1-1"
            - text: or alexia.
            - superscript [ref=e240]:
              - link "[3]" [ref=e241] [cursor=pointer]:
                - /url: "#cite_note-NIH2014Def-3"
            - text: The underlying mechanisms of dyslexia result from differences within
            - link "the brain's language processing" [ref=e242] [cursor=pointer]:
              - /url: /wiki/Language_processing_in_the_brain
            - text: .
            - superscript [ref=e243]:
              - link "[3]" [ref=e244] [cursor=pointer]:
                - /url: "#cite_note-NIH2014Def-3"
            - text: Dyslexia is diagnosed through a series of tests of memory, vision, spelling, and reading skills.
            - superscript [ref=e245]:
              - link "[4]" [ref=e246] [cursor=pointer]:
                - /url: "#cite_note-NIH2015Diag-4"
            - text: Dyslexia is separate from reading difficulties caused by
            - link "hearing" [ref=e247] [cursor=pointer]:
              - /url: /wiki/Hearing_problems
            - text: or
            - link "vision problems" [ref=e248] [cursor=pointer]:
              - /url: /wiki/Vision_problem
            - text: or by insufficient
            - link "teaching" [ref=e249] [cursor=pointer]:
              - /url: /wiki/Reading_education
            - text: or opportunity to learn.
            - superscript [ref=e250]:
              - link "[2]" [ref=e251] [cursor=pointer]:
                - /url: "#cite_note-Lancet2012-2"
          - paragraph [ref=e252]:
            - text: Treatment involves adjusting teaching methods to meet the person's needs.
            - superscript [ref=e253]:
              - link "[1]" [ref=e254] [cursor=pointer]:
                - /url: "#cite_note-ninds1-1"
            - text: While not curing the underlying problem, it may decrease the degree or impact of symptoms.
            - superscript [ref=e255]:
              - link "[9]" [ref=e256] [cursor=pointer]:
                - /url: "#cite_note-9"
            - text: Treatments targeting vision are not effective.
            - superscript [ref=e257]:
              - link "[10]" [ref=e258] [cursor=pointer]:
                - /url: "#cite_note-Handler2011-10"
            - text: Dyslexia is the most common
            - link "learning disability" [ref=e259] [cursor=pointer]:
              - /url: /wiki/Learning_disability
            - text: and occurs in all areas of the world.
            - superscript [ref=e260]:
              - link "[11]" [ref=e261] [cursor=pointer]:
                - /url: "#cite_note-UmphredLazaro2013m-11"
            - text: It affects 3–7% of the population;
            - superscript [ref=e262]:
              - link "[2]" [ref=e263] [cursor=pointer]:
                - /url: "#cite_note-Lancet2012-2"
            - superscript [ref=e264]:
              - link "[5]" [ref=e265] [cursor=pointer]:
                - /url: "#cite_note-Koo2013-5"
            - text: however, up to 20% of the general population may have some degree of symptoms.
            - superscript [ref=e266]:
              - link "[12]" [ref=e267] [cursor=pointer]:
                - /url: "#cite_note-12"
            - text: While dyslexia is more often diagnosed in boys, this is partly explained by a self-fulfilling
            - link "referral bias" [ref=e268] [cursor=pointer]:
              - /url: /wiki/Selection_bias#Sampling_bias
            - text: among teachers and professionals.
            - superscript [ref=e269]:
              - link "[2]" [ref=e270] [cursor=pointer]:
                - /url: "#cite_note-Lancet2012-2"
            - superscript [ref=e271]:
              - link "[13]" [ref=e272] [cursor=pointer]:
                - /url: "#cite_note-13"
            - text: It has even been suggested that the condition affects men and women equally.
            - superscript [ref=e273]:
              - link "[11]" [ref=e274] [cursor=pointer]:
                - /url: "#cite_note-UmphredLazaro2013m-11"
            - text: Some believe that dyslexia is best considered as a different way of learning, with both benefits and downsides.
            - superscript [ref=e275]:
              - link "[14]" [ref=e276] [cursor=pointer]:
                - /url: "#cite_note-14"
            - superscript [ref=e277]:
              - link "[15]" [ref=e278] [cursor=pointer]:
                - /url: "#cite_note-15"
          - heading "Classification" [level=2] [ref=e280]
          - note [ref=e281]:
            - text: "Main article:"
            - link "Pure alexia" [ref=e282] [cursor=pointer]:
              - /url: /wiki/Pure_alexia
          - paragraph [ref=e283]:
            - text: Dyslexia is divided into developmental and acquired forms.
            - superscript [ref=e284]:
              - link "[16]" [ref=e285] [cursor=pointer]:
                - /url: "#cite_note-16"
            - text: Acquired dyslexia occurs subsequent to neurological insult, such as
            - link "traumatic brain injury" [ref=e286] [cursor=pointer]:
              - /url: /wiki/Traumatic_brain_injury
            - text: or
            - link "stroke" [ref=e287] [cursor=pointer]:
              - /url: /wiki/Stroke
            - text: . People with acquired dyslexia exhibit some of the signs or symptoms of the developmental disorder, but require different assessment strategies and treatment approaches.
            - superscript [ref=e288]:
              - link "[17]" [ref=e289] [cursor=pointer]:
                - /url: "#cite_note-17"
            - text: Pure alexia, also known as agnosic alexia or pure word blindness, is one form of
            - link "alexia" [ref=e290] [cursor=pointer]:
              - /url: /wiki/Alexia_(condition)
            - text: which makes up "the peripheral dyslexia" group.
            - superscript [ref=e291]:
              - link "[18]" [ref=e292] [cursor=pointer]:
                - /url: "#cite_note-18"
          - heading "Signs and symptoms" [level=2] [ref=e294]
          - note [ref=e295]:
            - text: "See also:"
            - link "Characteristics of dyslexia" [ref=e296] [cursor=pointer]:
              - /url: /wiki/Characteristics_of_dyslexia
          - paragraph [ref=e297]:
            - text: In early childhood, symptoms that correlate with a later diagnosis of dyslexia include
            - link "delayed onset of speech" [ref=e298] [cursor=pointer]:
              - /url: /wiki/Speech_delay
            - text: and a lack of
            - link "phonological awareness" [ref=e299] [cursor=pointer]:
              - /url: /wiki/Phonological_awareness
            - text: .
            - superscript [ref=e300]:
              - link "[10]" [ref=e301] [cursor=pointer]:
                - /url: "#cite_note-Handler2011-10"
            - text: A common myth closely associates dyslexia with
            - link "mirror writing" [ref=e302] [cursor=pointer]:
              - /url: /wiki/Mirror_writing
            - text: and reading letters or words backwards.
            - superscript [ref=e303]:
              - link "[19]" [ref=e304] [cursor=pointer]:
                - /url: "#cite_note-LilienfeldLynn2011-19"
            - text: These behaviors are seen in many children as they learn to read and write, and are not considered to be defining characteristics of dyslexia.
            - superscript [ref=e305]:
              - link "[10]" [ref=e306] [cursor=pointer]:
                - /url: "#cite_note-Handler2011-10"
          - paragraph [ref=e307]:
            - text: School-age children with dyslexia may exhibit signs of difficulty in identifying or generating rhyming words, or counting the number of syllables in words—both of which depend on phonological awareness.
            - superscript [ref=e308]:
              - link "[20]" [ref=e309] [cursor=pointer]:
                - /url: "#cite_note-DAss-20"
            - text: They may also show difficulty in segmenting words into individual sounds (such as sounding out the three sounds of k, a, and t in cat) or may struggle to blend sounds, indicating reduced
            - link "phonemic awareness" [ref=e310] [cursor=pointer]:
              - /url: /wiki/Phonemic_awareness
            - text: .
            - superscript [ref=e311]:
              - link "[21]" [ref=e312] [cursor=pointer]:
                - /url: "#cite_note-PeerReid2014-21"
          - paragraph [ref=e313]:
            - text: Difficulties with word retrieval or naming things is also associated with dyslexia.
            - superscript [ref=e314]:
              - link "[22]" [ref=e315] [cursor=pointer]:
                - /url: "#cite_note-Shaywitz2013a-22"
            - superscript [ref=e316]: ": 647"
            - text: People with dyslexia are commonly poor spellers, a feature sometimes called dysorthographia or
            - link "dysgraphia" [ref=e318] [cursor=pointer]:
              - /url: /wiki/Dysgraphia
            - text: ", which depends on the skill of"
            - link "orthographic coding" [ref=e319] [cursor=pointer]:
              - /url: /wiki/Orthography
            - text: .
            - superscript [ref=e320]:
              - link "[10]" [ref=e321] [cursor=pointer]:
                - /url: "#cite_note-Handler2011-10"
          - paragraph [ref=e322]:
            - text: Problems persist into adolescence and adulthood and may include difficulties with summarizing stories, memorization, reading aloud, or learning foreign languages. Adults with dyslexia can often read with good comprehension, though they tend to read more slowly than others without a learning difficulty and perform worse in spelling tests or when reading nonsense words—a measure of phonological awareness.
            - superscript [ref=e323]:
              - link "[23]" [ref=e324] [cursor=pointer]:
                - /url: "#cite_note-23"
          - heading "Associated conditions" [level=3] [ref=e326]
          - paragraph [ref=e327]:
            - text: Dyslexia often co-occurs with other learning disorders, but the reasons for this comorbidity have not been clearly identified.
            - superscript [ref=e328]:
              - link "[24]" [ref=e329] [cursor=pointer]:
                - /url: "#cite_note-24"
            - text: "These associated disabilities include:"
          - generic [ref=e330]:
            - term [ref=e331]:
              - link "Dysgraphia" [ref=e332] [cursor=pointer]:
                - /url: /wiki/Dysgraphia
            - definition [ref=e333]:
              - text: A disorder involving difficulties with writing or typing, sometimes due to problems with
              - link "eye–hand coordination" [ref=e334] [cursor=pointer]:
                - /url: /wiki/Eye%E2%80%93hand_coordination
              - text: ; it also can impede direction- or sequence-oriented processes, such as tying knots or carrying out repetitive tasks.
              - superscript [ref=e335]:
                - link "[25]" [ref=e336] [cursor=pointer]:
                  - /url: "#cite_note-ReynoldsFletcherJanzen2007-25"
              - text: In dyslexia, dysgraphia is often multifactorial, due to impaired letter-writing
              - link "automaticity" [ref=e337] [cursor=pointer]:
                - /url: /wiki/Automaticity
              - text: ", organizational and elaborative difficulties, and impaired visual word forming, which makes it more difficult to retrieve the visual picture of words required for spelling."
              - superscript [ref=e338]:
                - link "[25]" [ref=e339] [cursor=pointer]:
                  - /url: "#cite_note-ReynoldsFletcherJanzen2007-25"
            - term [ref=e340]:
              - link "Attention deficit hyperactivity disorder" [ref=e341] [cursor=pointer]:
                - /url: /wiki/Attention_deficit_hyperactivity_disorder
              - text: (ADHD)
            - definition [ref=e342]:
              - text: A disorder characterized by problems sustaining attention, hyperactivity, or acting impulsively.
              - superscript [ref=e343]:
                - link "[26]" [ref=e344] [cursor=pointer]:
                  - /url: "#cite_note-26"
              - text: Dyslexia and ADHD commonly occur together.
              - superscript [ref=e345]:
                - link "[5]" [ref=e346] [cursor=pointer]:
                  - /url: "#cite_note-Koo2013-5"
              - superscript [ref=e347]:
                - link "[27]" [ref=e348] [cursor=pointer]:
                  - /url: "#cite_note-ComerGould2010-27"
              - superscript [ref=e349]:
                - link "[28]" [ref=e350] [cursor=pointer]:
                  - /url: "#cite_note-28"
              - text: Approximately 15%
              - superscript [ref=e351]:
                - link "[10]" [ref=e352] [cursor=pointer]:
                  - /url: "#cite_note-Handler2011-10"
              - text: or 12–24% of people with dyslexia have ADHD;
              - superscript [ref=e353]:
                - link "[29]" [ref=e354] [cursor=pointer]:
                  - /url: "#cite_note-FatemiSartorius2008-29"
              - text: and up to 35% of people with ADHD have dyslexia.
              - superscript [ref=e355]:
                - link "[10]" [ref=e356] [cursor=pointer]:
                  - /url: "#cite_note-Handler2011-10"
            - term [ref=e357]:
              - link "Auditory processing disorder" [ref=e358] [cursor=pointer]:
                - /url: /wiki/Auditory_processing_disorder
            - definition [ref=e359]:
              - text: A listening disorder that affects the ability to process auditory information.
              - superscript [ref=e360]:
                - link "[30]" [ref=e361] [cursor=pointer]:
                  - /url: "#cite_note-Capellini2007a-30"
              - superscript [ref=e362]:
                - link "[31]" [ref=e363] [cursor=pointer]:
                  - /url: "#cite_note-31"
              - text: This can lead to problems with
              - link "auditory memory" [ref=e364] [cursor=pointer]:
                - /url: /wiki/Auditory_memory
              - text: and auditory
              - link "sequencing" [ref=e365] [cursor=pointer]:
                - /url: /wiki/Sequence_learning
              - text: . Many people with dyslexia have auditory processing problems, and may develop their own
              - link "logographic cues" [ref=e366] [cursor=pointer]:
                - /url: /wiki/Logographic_cues
              - text: to compensate for this type of deficit. Some research suggests that auditory processing skills could be the primary shortfall in dyslexia.
              - superscript [ref=e367]:
                - link "[32]" [ref=e368] [cursor=pointer]:
                  - /url: "#cite_note-Pammer2014-32"
              - superscript [ref=e369]:
                - link "[33]" [ref=e370] [cursor=pointer]:
                  - /url: "#cite_note-33"
            - term [ref=e371]:
              - link "Developmental coordination disorder" [ref=e372] [cursor=pointer]:
                - /url: /wiki/Developmental_coordination_disorder
            - definition [ref=e373]:
              - text: A neurological condition characterized by difficulty in carrying out routine tasks involving balance, fine-
              - link "motor control" [ref=e374] [cursor=pointer]:
                - /url: /wiki/Motor_control
              - text: and
              - link "kinesthetic" [ref=e375] [cursor=pointer]:
                - /url: /wiki/Kinesthetic
              - text: coordination; difficulty in the use of speech sounds; and problems with
              - link "short-term memory" [ref=e376] [cursor=pointer]:
                - /url: /wiki/Short-term_memory
              - text: and organization.
              - superscript [ref=e377]:
                - link "[34]" [ref=e378] [cursor=pointer]:
                  - /url: "#cite_note-Pickering2012-34"
          - heading "Causes" [level=2] [ref=e380]
          - figure "Inferior parietal lobule – superior view animation" [ref=e381]:
            - link [ref=e382] [cursor=pointer]:
              - /url: /wiki/File:Inferior_parietal_lobule_-_superior_view_animation.gif
              - img [ref=e383]
            - generic [ref=e384]: Inferior parietal lobule – superior view animation
          - paragraph [ref=e385]:
            - text: Researchers have been trying to find the neurobiological basis of dyslexia since the condition was first identified in 1881.
            - superscript [ref=e386]:
              - link "[35]" [ref=e387] [cursor=pointer]:
                - /url: "#cite_note-Oswald_Berkhan_ref_1-35"
            - superscript [ref=e388]:
              - link "[36]" [ref=e389] [cursor=pointer]:
                - /url: "#cite_note-ReidFawcett2008x-36"
            - text: For example, some have tried to associate the common problem among people with dyslexia of not being able to see letters clearly to abnormal development of their visual nerve cells.
            - superscript [ref=e390]:
              - link "[37]" [ref=e391] [cursor=pointer]:
                - /url: "#cite_note-Stein2014-37"
          - heading "Neuroanatomy" [level=3] [ref=e393]
          - paragraph [ref=e394]:
            - link "Neuroimaging" [ref=e395] [cursor=pointer]:
              - /url: /wiki/Neuroimaging
            - text: techniques, such as
            - link "functional magnetic resonance imaging" [ref=e396] [cursor=pointer]:
              - /url: /wiki/Functional_magnetic_resonance_imaging
            - text: (
            - link "fMRI" [ref=e397] [cursor=pointer]:
              - /url: /wiki/FMRI
            - text: ) and
            - link "positron emission tomography" [ref=e398] [cursor=pointer]:
              - /url: /wiki/Positron_emission_tomography
            - text: (PET), have shown a correlation between both functional and structural differences in the brains of children with reading difficulties.
            - superscript [ref=e399]:
              - link "[38]" [ref=e400] [cursor=pointer]:
                - /url: "#cite_note-Whitaker2010r-38"
            - text: Some people with dyslexia show less activation in parts of the
            - link "left hemisphere" [ref=e401] [cursor=pointer]:
              - /url: /wiki/Lateralization_of_brain_function
            - text: of the brain involved with reading, such as the
            - link "inferior frontal gyrus" [ref=e402] [cursor=pointer]:
              - /url: /wiki/Inferior_frontal_gyrus
            - text: ","
            - link "inferior parietal lobule" [ref=e403] [cursor=pointer]:
              - /url: /wiki/Inferior_parietal_lobule
            - text: ", and the middle and"
            - link "ventral temporal cortex" [ref=e404] [cursor=pointer]:
              - /url: /wiki/Brodmann_area_20
            - text: .
            - superscript [ref=e405]:
              - link "[32]" [ref=e406] [cursor=pointer]:
                - /url: "#cite_note-Pammer2014-32"
            - text: Meta-analyses of fMRI studies have found under-activation where the
            - link "temporal" [ref=e407] [cursor=pointer]:
              - /url: /wiki/Temporal_lobe
            - text: and
            - link "occipital lobes" [ref=e408] [cursor=pointer]:
              - /url: /wiki/Occipital_lobe
            - text: meet in the left hemisphere in dyslexic subjects (including the
            - link "visual word form area" [ref=e409] [cursor=pointer]:
              - /url: /wiki/Visual_word_form_area
            - text: ).
            - superscript [ref=e410]:
              - link "[39]" [ref=e411] [cursor=pointer]:
                - /url: "#cite_note-39"
            - superscript [ref=e412]:
              - link "[40]" [ref=e413] [cursor=pointer]:
                - /url: "#cite_note-40"
            - text: Over the past decade, brain activation studies using PET to study language have produced a breakthrough in the understanding of the neural basis of language. Neural bases for the visual
            - link "lexicon" [ref=e414] [cursor=pointer]:
              - /url: /wiki/Lexicon
            - text: and for auditory verbal
            - link "short-term memory" [ref=e415] [cursor=pointer]:
              - /url: /wiki/Short-term_memory
            - text: components have been proposed,
            - superscript [ref=e416]:
              - link "[41]" [ref=e417] [cursor=pointer]:
                - /url: "#cite_note-41"
            - text: with some implication that the observed neural manifestation of developmental dyslexia is task-specific (i.e., functional rather than structural). fMRIs of people with dyslexia indicate an interactive role of the
            - link "cerebellum" [ref=e418] [cursor=pointer]:
              - /url: /wiki/Cerebellum
            - text: and cerebral cortex as well as other brain structures in reading.
            - superscript [ref=e419]:
              - link "[42]" [ref=e420] [cursor=pointer]:
                - /url: "#cite_note-42"
            - superscript [ref=e421]:
              - link "[43]" [ref=e422] [cursor=pointer]:
                - /url: "#cite_note-43"
          - paragraph [ref=e423]:
            - text: The cerebellar theory of dyslexia proposes that impairment of cerebellum-controlled muscle movement affects the formation of words by the tongue and facial muscles, resulting in the
            - link "fluency" [ref=e424] [cursor=pointer]:
              - /url: /wiki/Fluency
            - text: problems that some people with dyslexia experience. The cerebellum is also involved in the
            - link "automatization" [ref=e425] [cursor=pointer]:
              - /url: /wiki/Autonomic_nervous_system
            - text: of some tasks, such as reading.
            - superscript [ref=e426]:
              - link "[44]" [ref=e427] [cursor=pointer]:
                - /url: "#cite_note-44"
            - text: The fact that some children with dyslexia have motor task and balance impairments could be consistent with a cerebellar role in their reading difficulties. However, the cerebellar theory has not been supported by controlled research studies.
            - superscript [ref=e428]:
              - link "[45]" [ref=e429] [cursor=pointer]:
                - /url: "#cite_note-45"
          - heading "Genetics" [level=3] [ref=e431]
          - paragraph [ref=e432]:
            - text: Research into potential genetic causes of dyslexia has its roots in post-autopsy examination of the brains of people with dyslexia.
            - superscript [ref=e433]:
              - link "[37]" [ref=e434] [cursor=pointer]:
                - /url: "#cite_note-Stein2014-37"
            - text: Observed anatomical differences in the
            - link "language centers" [ref=e435] [cursor=pointer]:
              - /url: /wiki/Language_center
            - text: of such brains include microscopic
            - link "cortical" [ref=e436] [cursor=pointer]:
              - /url: /wiki/Cerebral_cortex
            - text: malformations known as
            - link "ectopias" [ref=e437] [cursor=pointer]:
              - /url: https://en.wiktionary.org/wiki/ectopia
            - text: ", and more rarely,"
            - link "vascular" [ref=e438] [cursor=pointer]:
              - /url: /wiki/Blood_vessel
            - text: micro-malformations, and
            - link "microgyrus" [ref=e439] [cursor=pointer]:
              - /url: /wiki/Microgyrus
            - text: —a smaller than usual size for the gyrus.
            - superscript [ref=e440]:
              - link "[46]" [ref=e441] [cursor=pointer]:
                - /url: "#cite_note-Faust2012-46"
            - text: The previously cited studies and others
            - superscript [ref=e442]:
              - link "[47]" [ref=e443] [cursor=pointer]:
                - /url: "#cite_note-47"
            - text: suggest that abnormal cortical development, presumed to occur before or during the sixth month of
            - link "fetal" [ref=e444] [cursor=pointer]:
              - /url: /wiki/Fetal
            - text: brain development, may have caused the abnormalities. Abnormal cell formations in people with dyslexia have also been reported in non-language cerebral and subcortical brain structures.
            - superscript [ref=e445]:
              - link "[48]" [ref=e446] [cursor=pointer]:
                - /url: "#cite_note-48"
            - text: Several genes have been associated with dyslexia, including
            - link "DCDC2" [ref=e447] [cursor=pointer]:
              - /url: /wiki/DCDC2
            - superscript [ref=e448]:
              - link "[49]" [ref=e449] [cursor=pointer]:
                - /url: "#cite_note-Marshall2012v-49"
            - text: and
            - link "KIAA0319" [ref=e450] [cursor=pointer]:
              - /url: /wiki/KIAA0319
            - superscript [ref=e451]:
              - link "[50]" [ref=e452] [cursor=pointer]:
                - /url: "#cite_note-50"
            - text: "on"
            - link "chromosome 6" [ref=e453] [cursor=pointer]:
              - /url: /wiki/Chromosome_6
            - text: ", and"
            - link "DYX1C1" [ref=e454] [cursor=pointer]:
              - /url: /wiki/DYX1C1
            - text: "on"
            - link "chromosome 15" [ref=e455] [cursor=pointer]:
              - /url: /wiki/Chromosome_15
            - text: .
            - superscript [ref=e456]:
              - link "[51]" [ref=e457] [cursor=pointer]:
                - /url: "#cite_note-Rosen2013v-51"
          - heading "Gene–environment interaction" [level=3] [ref=e459]: Gene–environment interaction
          - paragraph [ref=e460]:
            - text: The contribution of
            - link "gene–environment interaction" [ref=e461] [cursor=pointer]:
              - /url: /wiki/Gene%E2%80%93environment_interaction
            - text: to
            - link "reading (dis)ability" [ref=e462] [cursor=pointer]:
              - /url: /wiki/Reading_disability
            - text: ", which estimates the proportion of variance (the differences in reading ability across individuals) attributable to environmental and genetic factors, has been studied extensively by comparing sets of"
            - link "identical twins" [ref=e463] [cursor=pointer]:
              - /url: /wiki/Identical_twins
            - text: and
            - link "fraternal twins" [ref=e464] [cursor=pointer]:
              - /url: /wiki/Fraternal_twins
            - text: . Such
            - link "twin studies" [ref=e465] [cursor=pointer]:
              - /url: /wiki/Twin_study
            - text: show that both environmental and genetic influences contribute to
            - link "reading development" [ref=e466] [cursor=pointer]:
              - /url: /w/index.php?title=Reading_development&action=edit&redlink=1
            - text: ", with these two influences' relative impact varying by context. For example, parental education has been found to moderate genetic influences on reading (dis)ability,"
            - superscript [ref=e467]:
              - link "[52]" [ref=e468] [cursor=pointer]:
                - /url: "#cite_note-52"
            - text: and teacher quality can moderate genetic effects on early reading ability.
            - superscript [ref=e469]:
              - link "[53]" [ref=e470] [cursor=pointer]:
                - /url: "#cite_note-53"
            - text: Moreover, in more supportive environments, genetic risk factors account for a larger proportion of the variation in dyslexia.
            - superscript [ref=e471]:
              - link "[54]" [ref=e472] [cursor=pointer]:
                - /url: "#cite_note-pmid19209992-54"
            - text: This occurs because reducing environmental risks—through high-quality instruction and supportive caregiving—lowers environmental differences, making genetic effects easier to detect. If environmental risk factors are reduced with good teaching and a supporting caregiver environment, genetic risk factors may play a bigger role in explaining why some people have dyslexia
            - superscript [ref=e473]:
              - link "[54]" [ref=e474] [cursor=pointer]:
                - /url: "#cite_note-pmid19209992-54"
            - text: because the genetic effect is easier to detect given that much environmental noise is
            - link "bracketed-out" [ref=e475] [cursor=pointer]:
              - /url: /wiki/Bracketing_(phenomenology)
            - text: .
          - paragraph [ref=e476]:
            - text: As environment plays a large role in learning and memory, it is likely that
            - link "epigenetic" [ref=e477] [cursor=pointer]:
              - /url: /wiki/Epigenetic
            - text: modifications play an important role in reading ability. Measures of
            - link "gene expression" [ref=e478] [cursor=pointer]:
              - /url: /wiki/Gene_expression
            - text: ","
            - link "histone modifications" [ref=e479] [cursor=pointer]:
              - /url: /wiki/Histone#Histone_modification
            - text: ", and"
            - link "methylation" [ref=e480] [cursor=pointer]:
              - /url: /wiki/Methylation
            - text: in the human periphery are used to study epigenetic processes; however, all of these have limitations in the extrapolation of results for application to the human brain.
            - superscript [ref=e481]:
              - link "[55]" [ref=e482] [cursor=pointer]:
                - /url: "#cite_note-55"
            - superscript [ref=e483]:
              - link "[56]" [ref=e484] [cursor=pointer]:
                - /url: "#cite_note-56"
          - heading "Language" [level=4] [ref=e486]
          - paragraph [ref=e487]:
            - text: The
            - link "orthographic complexity" [ref=e488] [cursor=pointer]:
              - /url: /wiki/Orthographic_depth
            - text: of a language directly affects how difficult it is to learn to read it.
            - superscript [ref=e489]:
              - link "[57]" [ref=e490] [cursor=pointer]:
                - /url: "#cite_note-BrunswickMcDougall2010-57"
            - superscript [ref=e491]: ": 266"
            - text: English and French have comparatively "deep"
            - link "phonemic orthographies" [ref=e492] [cursor=pointer]:
              - /url: /wiki/Phonemic_orthographies
            - text: within the
            - link "Latin alphabet" [ref=e493] [cursor=pointer]:
              - /url: /wiki/Latin_alphabet
            - link "writing system" [ref=e494] [cursor=pointer]:
              - /url: /wiki/Writing_system
            - text: ", with complex structures employing spelling patterns on several levels: letter-sound correspondence, syllables, and"
            - link "morphemes" [ref=e495] [cursor=pointer]:
              - /url: /wiki/Morpheme
            - text: .
            - superscript [ref=e496]:
              - link "[58]" [ref=e497] [cursor=pointer]:
                - /url: "#cite_note-DickinsonNeuman2013-58"
            - superscript [ref=e498]: ": 421"
            - text: Languages such as Spanish, Italian and Finnish primarily employ letter-sound correspondence—so-called "shallow" orthographies—which makes them easier to learn for people with dyslexia.
            - superscript [ref=e499]:
              - link "[57]" [ref=e500] [cursor=pointer]:
                - /url: "#cite_note-BrunswickMcDougall2010-57"
            - superscript [ref=e501]: ": 266"
            - link "Logographic" [ref=e502] [cursor=pointer]:
              - /url: /wiki/Logograph
            - text: writing systems, such as
            - link "Chinese characters" [ref=e503] [cursor=pointer]:
              - /url: /wiki/Chinese_characters
            - text: ", have extensive symbol use, and these also pose problems for dyslexic learners."
            - superscript [ref=e504]:
              - link "[59]" [ref=e505] [cursor=pointer]:
                - /url: "#cite_note-59"
          - heading "Pathophysiology" [level=2] [ref=e507]
          - figure "Corpus callosum view, front part at top of image" [ref=e508]:
            - link [ref=e509] [cursor=pointer]:
              - /url: /wiki/File:Gray733.png
              - img [ref=e510]
            - generic [ref=e511]: Corpus callosum view, front part at top of image
          - paragraph [ref=e512]:
            - text: For most people who are right-hand dominant, the left hemisphere of their brain is more specialized for
            - link "language processing" [ref=e513] [cursor=pointer]:
              - /url: /wiki/Lateralization_of_brain_function#Language
            - text: . With regard to the mechanism of dyslexia, fMRI studies suggest that this specialization is less pronounced or absent in people with dyslexia. In other studies, dyslexia is correlated with anatomical differences in the
            - link "corpus callosum" [ref=e514] [cursor=pointer]:
              - /url: /wiki/Corpus_callosum
            - text: ", the bundle of nerve fibers that connects the left and right hemispheres."
            - superscript [ref=e515]:
              - link "[60]" [ref=e516] [cursor=pointer]:
                - /url: "#cite_note-habi-60"
          - paragraph [ref=e517]:
            - text: Data via diffusion tensor MRI indicate changes in connectivity or in gray matter density in areas related to reading and language. Finally, the left
            - link "inferior frontal gyrus" [ref=e518] [cursor=pointer]:
              - /url: /wiki/Inferior_frontal_gyrus
            - text: has shown differences in phonological processing in people with dyslexia.
            - superscript [ref=e519]:
              - link "[60]" [ref=e520] [cursor=pointer]:
                - /url: "#cite_note-habi-60"
            - text: Neurophysiological and imaging procedures are being used to ascertain phenotypic characteristics in people with dyslexia, thus identifying the effects of dyslexia-related genes.
            - superscript [ref=e521]:
              - link "[61]" [ref=e522] [cursor=pointer]:
                - /url: "#cite_note-61"
          - heading "Dual route theory" [level=3] [ref=e524]
          - paragraph [ref=e525]:
            - text: The dual-route theory of reading aloud was first described in the early 1970s.
            - superscript [ref=e526]:
              - link "[62]" [ref=e527] [cursor=pointer]:
                - /url: "#cite_note-Pritchard_2012-62"
            - text: This theory suggests that two separate mental mechanisms, or cognitive routes, are involved in reading aloud.
            - superscript [ref=e528]:
              - link "[63]" [ref=e529] [cursor=pointer]:
                - /url: "#cite_note-EysenckKeane2013z-63"
            - text: One mechanism is the lexical route, which is the process whereby skilled readers can recognize known words by sight alone, through a "dictionary" lookup procedure.
            - superscript [ref=e530]:
              - link "[64]" [ref=e531] [cursor=pointer]:
                - /url: "#cite_note-EysenckKeane2013-64"
            - text: The other mechanism is the nonlexical or sublexical route, which is the process whereby the reader can "sound out" a written word.
            - superscript [ref=e532]:
              - link "[64]" [ref=e533] [cursor=pointer]:
                - /url: "#cite_note-EysenckKeane2013-64"
            - superscript [ref=e534]:
              - link "[65]" [ref=e535] [cursor=pointer]:
                - /url: "#cite_note-HulmeJoshi2012-65"
            - text: This is done by identifying the word's constituent parts (letters,
            - link "phonemes" [ref=e536] [cursor=pointer]:
              - /url: /wiki/Phonemes
            - text: ","
            - link "graphemes" [ref=e537] [cursor=pointer]:
              - /url: /wiki/Graphemes
            - text: ) and applying knowledge of how these parts are associated with each other — for example, how a string of neighboring letters sound together.
            - superscript [ref=e538]:
              - link "[62]" [ref=e539] [cursor=pointer]:
                - /url: "#cite_note-Pritchard_2012-62"
            - text: The dual-route system could explain the different rates of dyslexia occurrence between different languages (e.g., the consistency of phonological rules in the Spanish language could account for the fact that Spanish-speaking children show a higher level of performance in non-word reading, when compared to English-speakers).
            - superscript [ref=e540]:
              - link "[57]" [ref=e541] [cursor=pointer]:
                - /url: "#cite_note-BrunswickMcDougall2010-57"
            - superscript [ref=e542]:
              - link "[66]" [ref=e543] [cursor=pointer]:
                - /url: "#cite_note-66"
          - heading "Diagnosis" [level=2] [ref=e545]
          - paragraph [ref=e546]:
            - text: Dyslexia is a heterogeneous, dimensional learning disorder that impairs accurate and fluent word reading and spelling.
            - superscript [ref=e547]:
              - link "[67]" [ref=e548] [cursor=pointer]:
                - /url: "#cite_note-67"
            - superscript [ref=e549]:
              - link "[68]" [ref=e550] [cursor=pointer]:
                - /url: "#cite_note-68"
            - text: Typical—but not universal—features include difficulties with phonological awareness, inefficient and often inaccurate processing of sounds in oral language (phonological processing), and verbal working memory deficits.
            - superscript [ref=e551]:
              - link "[69]" [ref=e552] [cursor=pointer]:
                - /url: "#cite_note-69"
            - superscript [ref=e553]:
              - link "[70]" [ref=e554] [cursor=pointer]:
                - /url: "#cite_note-very-short-70"
          - paragraph [ref=e555]:
            - text: Dyslexia is a
            - link "neurodevelopmental disorder" [ref=e556] [cursor=pointer]:
              - /url: /wiki/Neurodevelopmental_disorder
            - text: ", subcategorized in diagnostic guides as a learning disorder with impairment in reading (ICD-11 prefixes \"developmental\" to \"learning disorder\"; DSM-5 uses \"specific\")."
            - superscript [ref=e557]:
              - link "[71]" [ref=e558] [cursor=pointer]:
                - /url: "#cite_note-71"
            - superscript [ref=e559]:
              - link "[72]" [ref=e560] [cursor=pointer]:
                - /url: "#cite_note-72"
            - superscript [ref=e561]:
              - link "[73]" [ref=e562] [cursor=pointer]:
                - /url: "#cite_note-73"
            - text: Dyslexia is not a problem with intelligence.
            - link "Emotional problems" [ref=e563] [cursor=pointer]:
              - /url: /wiki/Emotional_problems
            - text: often arise secondary to learning difficulties.
            - superscript [ref=e564]:
              - link "[74]" [ref=e565] [cursor=pointer]:
                - /url: "#cite_note-Campbell2009-74"
            - text: The
            - link "National Institute of Neurological Disorders and Stroke" [ref=e566] [cursor=pointer]:
              - /url: /wiki/National_Institute_of_Neurological_Disorders_and_Stroke
            - text: describes dyslexia as "difficulty with phonological processing (the manipulation of sounds), spelling, and/or rapid visual-verbal responding".
            - superscript [ref=e567]:
              - link "[1]" [ref=e568] [cursor=pointer]:
                - /url: "#cite_note-ninds1-1"
          - paragraph [ref=e569]:
            - text: The British Dyslexia Association defines dyslexia as "a learning difficulty that primarily affects the skills involved in accurate and fluent word reading and spelling" and is characterized by "difficulties in phonological awareness, verbal memory and verbal processing speed".
            - superscript [ref=e570]:
              - link "[75]" [ref=e571] [cursor=pointer]:
                - /url: "#cite_note-PhillipsKelly2013-75"
            - text: Phonological awareness enables one to identify, discriminate, remember (
            - link "working memory" [ref=e572] [cursor=pointer]:
              - /url: /wiki/Working_memory
            - text: ), and mentally manipulate the sound structures of language—
            - link "phonemes" [ref=e573] [cursor=pointer]:
              - /url: /wiki/Phonemes
            - text: ", onsite-rime segments, syllables, and words."
            - superscript [ref=e574]:
              - link "[76]" [ref=e575] [cursor=pointer]:
                - /url: "#cite_note-76"
            - superscript [ref=e576]:
              - link "[77]" [ref=e577] [cursor=pointer]:
                - /url: "#cite_note-77"
          - heading "Assessment" [level=3] [ref=e579]
          - paragraph [ref=e580]: "The following can be done to assess for dyslexia:"
          - paragraph [ref=e581]:
            - text: Apply a multidisciplinary team approach involving the child's parent(s) and teacher(s), school psychologist, pediatrician, and, as appropriate,
            - link "speech and language pathologist (speech therapist)" [ref=e582] [cursor=pointer]:
              - /url: /wiki/Speech%E2%80%93language_pathology
            - text: ", and"
            - link "occupational therapist" [ref=e583] [cursor=pointer]:
              - /url: /wiki/Occupational_therapy
            - text: .
            - superscript [ref=e584]:
              - link "[78]" [ref=e585] [cursor=pointer]:
                - /url: "#cite_note-78"
          - paragraph [ref=e586]:
            - text: Gain familiarity with typical ages children reach various general developmental milestones, and domain-specific milestones, such as phonological awareness (recognizing rhyming words; identifying the initial sounds in words).
            - superscript [ref=e587]:
              - link "[79]" [ref=e588] [cursor=pointer]:
                - /url: "#cite_note-79"
          - paragraph [ref=e589]:
            - text: Do not rely on tests exclusively. Careful observation of the child in the school and home environments, and sensitive, comprehensive parental interviews are just as important as tests.
            - superscript [ref=e590]:
              - link "[80]" [ref=e591] [cursor=pointer]:
                - /url: "#cite_note-80"
            - superscript [ref=e592]:
              - link "[81]" [ref=e593] [cursor=pointer]:
                - /url: "#cite_note-81"
          - paragraph [ref=e594]:
            - text: Look at the empirically supported
            - link "response to intervention" [ref=e595] [cursor=pointer]:
              - /url: /wiki/Response_to_Intervention
            - text: (RTI) approach,
            - superscript [ref=e596]:
              - link "[82]" [ref=e597] [cursor=pointer]:
                - /url: "#cite_note-82"
            - text: which "... involves monitoring the progress of a group of children through a programme of intervention rather than undertaking a static assessment of their current skills. Children with the most need are those who fail to respond to effective teaching, and they are readily identified using this approach."
            - superscript [ref=e598]:
              - link "[83]" [ref=e599] [cursor=pointer]:
                - /url: "#cite_note-83"
          - heading "Assessment tests" [level=4] [ref=e601]
          - paragraph [ref=e602]:
            - text: There is a wide range of tests that are used in clinical and educational settings to evaluate the possibility of dyslexia.
            - superscript [ref=e603]:
              - link "[84]" [ref=e604] [cursor=pointer]:
                - /url: "#cite_note-testing-84"
            - text: If initial testing suggests that a person might have dyslexia, such tests are often followed up with a full diagnostic assessment to determine the extent and nature of the disorder.
            - superscript [ref=e605]:
              - link "[85]" [ref=e606] [cursor=pointer]:
                - /url: "#cite_note-PeerReid2013p-85"
            - text: Some tests can be administered by a teacher or computer; others require specialized training and are given by psychologists.
            - superscript [ref=e607]:
              - link "[86]" [ref=e608] [cursor=pointer]:
                - /url: "#cite_note-balexia-86"
            - text: Some test results indicate how to carry out teaching strategies.
            - superscript [ref=e609]:
              - link "[86]" [ref=e610] [cursor=pointer]:
                - /url: "#cite_note-balexia-86"
            - superscript [ref=e611]:
              - link "[87]" [ref=e612] [cursor=pointer]:
                - /url: "#cite_note-flet-87"
            - text: "Because a variety of different cognitive, behavioral, emotional, and environmental factors all could contribute to difficulty learning to read, a comprehensive evaluation should consider these different possibilities. These tests and observations can include:"
            - superscript [ref=e613]:
              - link "[88]" [ref=e614] [cursor=pointer]:
                - /url: "#cite_note-gerd-88"
          - list [ref=e615]:
            - listitem [ref=e616]:
              - text: General measures of cognitive ability, such as the
              - link "Wechsler Intelligence Scale for Children" [ref=e617] [cursor=pointer]:
                - /url: /wiki/Wechsler_Intelligence_Scale_for_Children
              - text: ","
              - link "Woodcock-Johnson Tests of Cognitive Abilities" [ref=e618] [cursor=pointer]:
                - /url: /wiki/Woodcock%E2%80%93Johnson_Tests_of_Cognitive_Abilities
              - text: ", or"
              - link "Stanford-Binet Intelligence Scales" [ref=e619] [cursor=pointer]:
                - /url: /wiki/Stanford%E2%80%93Binet_Intelligence_Scales
              - text: . Low general cognitive ability would make reading more difficult. Cognitive ability measures also often try to measure different cognitive processes, such as verbal ability, nonverbal and spatial reasoning, working memory, and processing speed. There are different versions of these tests for different age groups. Almost all of these require additional training to give and score correctly, and are done by psychologists. According to Mather and Schneider (2015), a confirmatory profile and/or pattern of scores on cognitive tests confirming or ruling-out reading disorder has not yet been identified.
              - superscript [ref=e620]:
                - link "[89]" [ref=e621] [cursor=pointer]:
                  - /url: "#cite_note-89"
            - listitem [ref=e622]:
              - text: "Screening or evaluation for mental health conditions: Parents and teachers can complete rating scales or behavior checklists to gather information about emotional and behavioral functioning for younger people. Many checklists have similar versions for parents, teachers, and younger people old enough to read reasonably well (often 11 years and older) to complete. Examples include the Behavioral Assessment System for Children, and the"
              - link "Strengths and Difficulties Questionnaire" [ref=e623] [cursor=pointer]:
                - /url: /wiki/Strengths_and_Difficulties_Questionnaire
              - text: . All of these have nationally representative norms, making it possible to compare the level of symptoms to what would be typical for the younger person's age and biological sex. Other checklists link more specifically to psychiatric diagnoses, such as the
              - link "Vanderbilt ADHD Rating Scales" [ref=e624] [cursor=pointer]:
                - /url: /wiki/Vanderbilt_ADHD_Diagnostic_Rating_Scale
              - text: or the
              - link "Screen for Child Anxiety Related Emotional Disorders (SCARED)" [ref=e625] [cursor=pointer]:
                - /url: /wiki/Screen_for_child_anxiety_related_disorders
              - text: .
              - link "Screening" [ref=e626] [cursor=pointer]:
                - /url: /wiki/Screening_(medicine)
              - text: uses brief tools that are designed to catch cases with a disorder, but they often get false positive scores for people who do not have the disorder. Screeners should be followed up by a more accurate test or diagnostic interview as a result. Depressive disorders and anxiety disorders are two-three times higher in people with dyslexia, and attention-deficit/hyperactivity disorder is more common, as well.
              - superscript [ref=e627]:
                - link "[90]" [ref=e628] [cursor=pointer]:
                  - /url: "#cite_note-90"
              - superscript [ref=e629]:
                - link "[91]" [ref=e630] [cursor=pointer]:
                  - /url: "#cite_note-91"
              - superscript [ref=e631]:
                - link "[92]" [ref=e632] [cursor=pointer]:
                  - /url: "#cite_note-92"
              - superscript [ref=e633]:
                - link "[93]" [ref=e634] [cursor=pointer]:
                  - /url: "#cite_note-93"
            - listitem [ref=e635]:
              - text: "Review of academic achievement and skills: Average spelling/reading ability for a dyslexic is a percentage ranking <16, well below normal. In addition to reviewing grades and teacher notes, standardized test results are helpful in evaluating progress. These include group administered tests, such as the"
              - link "Iowa Tests of Educational Development" [ref=e636] [cursor=pointer]:
                - /url: /wiki/Iowa_Tests_of_Educational_Development
              - text: ", that a teacher may give to a group or whole classroom of younger people at the same time. They also could include individually administered tests of achievement, such as the"
              - link "Wide Range Achievement Test" [ref=e637] [cursor=pointer]:
                - /url: /wiki/Wide_Range_Achievement_Test
              - text: ", or the"
              - link "Woodcock-Johnson" [ref=e638] [cursor=pointer]:
                - /url: /wiki/Woodcock%E2%80%93Johnson_Tests_of_Cognitive_Abilities
              - text: (which also includes a set of achievement tests). The individually administered tests again require more specialized training.
              - superscript [ref=e639]:
                - link "[94]" [ref=e640] [cursor=pointer]:
                  - /url: "#cite_note-94"
              - superscript [ref=e641]:
                - link "[95]" [ref=e642] [cursor=pointer]:
                  - /url: "#cite_note-95"
              - superscript [ref=e643]:
                - link "[96]" [ref=e644] [cursor=pointer]:
                  - /url: "#cite_note-96"
          - heading "Screening" [level=2] [ref=e646]
          - paragraph [ref=e647]:
            - text: Screening procedures seek to identify children who show signs of possible dyslexia. In the preschool years, a family history of dyslexia, particularly in biological parents and siblings, predicts an eventual dyslexia diagnosis better than any test.
            - superscript [ref=e648]:
              - link "[97]" [ref=e649] [cursor=pointer]:
                - /url: "#cite_note-97"
            - text: In primary school (ages 5–7), the ideal screening procedure consists of training primary school teachers to carefully observe and record their pupils' progress through the phonics curriculum, and thereby identify children progressing slowly.
            - superscript [ref=e650]:
              - link "[98]" [ref=e651] [cursor=pointer]:
                - /url: "#cite_note-98"
            - superscript [ref=e652]:
              - link "[99]" [ref=e653] [cursor=pointer]:
                - /url: "#cite_note-99"
            - text: When teachers identify such students they can supplement their observations with screening tests such as the Phonics screening check
            - superscript [ref=e654]:
              - link "[100]" [ref=e655] [cursor=pointer]:
                - /url: "#cite_note-100"
            - text: used by United Kingdom schools during
            - link "Year 1" [ref=e656] [cursor=pointer]:
              - /url: /wiki/Year_One_(education)
            - text: .
          - paragraph [ref=e657]:
            - text: In the medical setting, child and adolescent psychiatrist M. S. Thambirajah emphasizes that "[g]iven the high prevalence of developmental disorders in school-aged children, all children seen in clinics should be systematically screened for developmental disorders irrespective of the presenting problem/s." Thambirajah recommends screening for developmental disorders, including dyslexia, by conducting a brief developmental history, a preliminary psychosocial developmental examination, and obtaining a school report regarding academic and social functioning.
            - superscript [ref=e658]:
              - link "[101]" [ref=e659] [cursor=pointer]:
                - /url: "#cite_note-101"
          - heading "Management" [level=2] [ref=e661]
          - note [ref=e662]:
            - text: "Main article:"
            - link "Management of dyslexia" [ref=e663] [cursor=pointer]:
              - /url: /wiki/Management_of_dyslexia
          - paragraph [ref=e664]:
            - text: Through the use of compensation strategies, therapy and educational support, individuals with dyslexia can learn to read and write.
            - superscript [ref=e665]:
              - link "[102]" [ref=e666] [cursor=pointer]:
                - /url: "#cite_note-102"
            - text: There are techniques and technical aids that help to manage or conceal symptoms of the disorder.
            - superscript [ref=e667]:
              - link "[103]" [ref=e668] [cursor=pointer]:
                - /url: "#cite_note-Brunswick2012-103"
            - text: Reducing stress and anxiety can sometimes improve written comprehension.
            - superscript [ref=e669]:
              - link "[104]" [ref=e670] [cursor=pointer]:
                - /url: "#cite_note-pmid21046003-104"
            - text: For
            - link "dyslexia intervention" [ref=e671] [cursor=pointer]:
              - /url: /wiki/Dyslexia_intervention
            - text: with alphabet-writing systems, the fundamental aim is to increase a child's awareness of correspondences between
            - link "graphemes" [ref=e672] [cursor=pointer]:
              - /url: /wiki/Grapheme
            - text: (letters) and
            - link "phonemes" [ref=e673] [cursor=pointer]:
              - /url: /wiki/Phoneme
            - text: (sounds), and to relate these to reading and spelling by teaching how sounds blend into words. Reinforced collateral training focused on reading and spelling may yield longer-lasting gains than oral phonological training alone.
            - superscript [ref=e674]:
              - link "[105]" [ref=e675] [cursor=pointer]:
                - /url: "#cite_note-Lyytinen-105"
            - text: Early intervention can be successful in reducing reading failure.
            - superscript [ref=e676]:
              - link "[106]" [ref=e677] [cursor=pointer]:
                - /url: "#cite_note-106"
          - paragraph [ref=e678]:
            - text: Research does not suggest that
            - link "specially-tailored fonts" [ref=e679] [cursor=pointer]:
              - /url: /wiki/Management_of_dyslexia#List_of_typefaces_that_manage_dyslexia
            - text: (such as
            - link "Dyslexie" [ref=e680] [cursor=pointer]:
              - /url: /wiki/Dyslexie
            - text: and
            - link "OpenDyslexic" [ref=e681] [cursor=pointer]:
              - /url: /wiki/OpenDyslexic
            - text: ) help with reading. In experiments, a more significant difference in reading performance was driven by
            - link "interline spacing" [ref=e682] [cursor=pointer]:
              - /url: /wiki/Interline_spacing
            - text: ", and the difference was not significant once variables such as interline spacing and"
            - link "x-height" [ref=e683] [cursor=pointer]:
              - /url: /wiki/X-height
            - text: were normalised between the candidate fonts.
            - superscript [ref=e684]:
              - link "[107]" [ref=e685] [cursor=pointer]:
                - /url: "#cite_note-Kuster-107"
            - text: Children with dyslexia read text set in a regular font such as
            - link "Times New Roman" [ref=e686] [cursor=pointer]:
              - /url: /wiki/Times_New_Roman
            - text: and
            - link "Arial" [ref=e687] [cursor=pointer]:
              - /url: /wiki/Arial
            - text: just as quickly, and they show a preference for regular fonts over specially-tailored fonts.
            - superscript [ref=e688]:
              - link "[107]" [ref=e689] [cursor=pointer]:
                - /url: "#cite_note-Kuster-107"
            - text: Some research has pointed to increased
            - link "letter-spacing" [ref=e690] [cursor=pointer]:
              - /url: /wiki/Letter-spacing
            - text: being beneficial.
            - superscript [ref=e691]:
              - link "[107]" [ref=e692] [cursor=pointer]:
                - /url: "#cite_note-Kuster-107"
          - paragraph [ref=e693]:
            - text: There is currently no evidence showing that music education significantly improves the reading skills of adolescents with dyslexia.
            - superscript [ref=e694]:
              - link "[108]" [ref=e695] [cursor=pointer]:
                - /url: "#cite_note-108"
          - heading "Prognosis" [level=2] [ref=e697]
          - paragraph [ref=e698]:
            - text: Dyslexic children require special instruction for word analysis and spelling from an early age.
            - superscript [ref=e699]:
              - link "[109]" [ref=e700] [cursor=pointer]:
                - /url: "#cite_note-109"
            - text: The prognosis, generally speaking, is positive for individuals who are identified in childhood and receive support from friends and family.
            - superscript [ref=e701]:
              - link "[1]" [ref=e702] [cursor=pointer]:
                - /url: "#cite_note-ninds1-1"
            - text: The New York educational system (NYED) indicates "a daily uninterrupted 90-minute block of instruction in reading" and "instruction in phonemic awareness, phonics, vocabulary development, reading fluency" so as to improve the individual's reading ability.
            - superscript [ref=e703]:
              - link "[110]" [ref=e704] [cursor=pointer]:
                - /url: "#cite_note-110"
          - heading "Epidemiology" [level=2] [ref=e706]
          - paragraph [ref=e707]:
            - text: The prevalence of dyslexia is unknown, but it has been estimated to be as low as 5% and as high as 17% of the population.
            - superscript [ref=e708]:
              - link "[111]" [ref=e709] [cursor=pointer]:
                - /url: "#cite_note-111"
            - text: Dyslexia is diagnosed more often in males.
            - superscript [ref=e710]:
              - link "[2]" [ref=e711] [cursor=pointer]:
                - /url: "#cite_note-Lancet2012-2"
          - paragraph [ref=e712]:
            - text: There are different definitions of dyslexia used throughout the world. Further, differences in writing systems may affect development of written language ability due to the interplay between auditory and written representations of phonemes.
            - superscript [ref=e713]:
              - link "[112]" [ref=e714] [cursor=pointer]:
                - /url: "#cite_note-112"
            - text: Dyslexia is not limited to difficulty in converting letters to sounds, and Chinese people with dyslexia may have difficulty converting
            - link "Chinese characters" [ref=e715] [cursor=pointer]:
              - /url: /wiki/Chinese_character
            - text: into their meanings.
            - superscript [ref=e716]:
              - link "[113]" [ref=e717] [cursor=pointer]:
                - /url: "#cite_note-113"
            - superscript [ref=e718]:
              - link "[114]" [ref=e719] [cursor=pointer]:
                - /url: "#cite_note-Marshall2012l-114"
            - text: The Chinese vocabulary uses logographic, monographic, non-alphabet writing where one character can represent an individual phoneme.
            - superscript [ref=e720]:
              - link "[115]" [ref=e721] [cursor=pointer]:
                - /url: "#cite_note-115"
          - paragraph [ref=e722]:
            - text: The phonological-processing hypothesis attempts to explain why dyslexia occurs in a wide variety of languages. Furthermore, the relationship between phonological capacity and reading appears to be influenced by orthography.
            - superscript [ref=e723]:
              - link "[116]" [ref=e724] [cursor=pointer]:
                - /url: "#cite_note-116"
          - heading "History" [level=2] [ref=e726]
          - note [ref=e727]:
            - text: "Main article:"
            - link "History of dyslexia research" [ref=e728] [cursor=pointer]:
              - /url: /wiki/History_of_dyslexia_research
          - paragraph [ref=e729]:
            - text: Dyslexia was clinically described by
            - link "Oswald Berkhan" [ref=e730] [cursor=pointer]:
              - /url: /wiki/Oswald_Berkhan
            - text: in 1881,
            - superscript [ref=e731]:
              - link "[35]" [ref=e732] [cursor=pointer]:
                - /url: "#cite_note-Oswald_Berkhan_ref_1-35"
            - text: but the term dyslexia was coined in 1883 by
            - link "Rudolf Berlin" [ref=e733] [cursor=pointer]:
              - /url: /wiki/Rudolf_Berlin
            - text: ", an"
            - link "ophthalmologist" [ref=e734] [cursor=pointer]:
              - /url: /wiki/Ophthalmologist
            - text: in
            - link "Stuttgart" [ref=e735] [cursor=pointer]:
              - /url: /wiki/Stuttgart
            - text: .
            - superscript [ref=e736]:
              - link "[117]" [ref=e737] [cursor=pointer]:
                - /url: "#cite_note-Berlin-117"
            - superscript [ref=e738]:
              - link "[118]" [ref=e739] [cursor=pointer]:
                - /url: "#cite_note-Websters-118"
            - superscript [ref=e740]:
              - link "[119]" [ref=e741] [cursor=pointer]:
                - /url: "#cite_note-119"
            - text: He used the term to refer to the case of a young boy who had severe difficulty learning to read and write, despite showing typical intelligence and physical abilities in all other respects.
            - superscript [ref=e742]:
              - link "[120]" [ref=e743] [cursor=pointer]:
                - /url: "#cite_note-120"
            - text: In 1896, W. Pringle Morgan, a British physician from
            - link "Seaford, East Sussex" [ref=e744] [cursor=pointer]:
              - /url: /wiki/Seaford,_East_Sussex
            - text: ", published a description of a reading-specific learning disorder in a report to the"
            - link "British Medical Journal" [ref=e746] [cursor=pointer]:
              - /url: /wiki/British_Medical_Journal
            - text: titled "Congenital Word Blindness".
            - superscript [ref=e747]:
              - link "[121]" [ref=e748] [cursor=pointer]:
                - /url: "#cite_note-121"
            - text: The distinction between phonological versus surface types of dyslexia is only descriptive, and without any etiological assumption as to the underlying brain mechanisms. However, studies have alluded to potential differences due to variation in performance.
            - superscript [ref=e749]:
              - link "[122]" [ref=e750] [cursor=pointer]:
                - /url: "#cite_note-122"
            - text: Over time, the consensus has changed from an intelligence-based model to an age-based model for dyslexia .
            - superscript [ref=e751]:
              - link "[123]" [ref=e752] [cursor=pointer]:
                - /url: "#cite_note-123"
            - superscript [ref=e753]:
              - link "[87]" [ref=e754] [cursor=pointer]:
                - /url: "#cite_note-flet-87"
          - heading "Society and culture" [level=2] [ref=e756]
          - note [ref=e757]:
            - text: "See also:"
            - link "List of artistic depictions of dyslexia" [ref=e758] [cursor=pointer]:
              - /url: /wiki/List_of_artistic_depictions_of_dyslexia
          - paragraph [ref=e759]:
            - text: As is the case with any disorder, society often makes an assessment based on incomplete information. Before the 1980s, dyslexia was thought to be a consequence of education, rather than a neurological disability. As a result, society often misjudges those with the disorder.
            - superscript [ref=e760]:
              - link "[104]" [ref=e761] [cursor=pointer]:
                - /url: "#cite_note-pmid21046003-104"
            - text: There is also sometimes a workplace stigma and negative attitude towards those with dyslexia.
            - superscript [ref=e762]:
              - link "[124]" [ref=e763] [cursor=pointer]:
                - /url: "#cite_note-124"
            - text: If the instructors of a person with dyslexia lack the necessary training to support a child with the condition, there is often a negative effect on the student's learning participation.
            - superscript [ref=e764]:
              - link "[125]" [ref=e765] [cursor=pointer]:
                - /url: "#cite_note-125"
          - paragraph [ref=e766]:
            - text: Since at least the 1960s in the UK, the children diagnosed with developmental dyslexia have consistently been from privileged families.
            - superscript [ref=e767]:
              - link "[126]" [ref=e768] [cursor=pointer]:
                - /url: "#cite_note-:0-126"
            - text: Although half of prisoners in the UK have significant reading difficulties, very few have ever been evaluated for dyslexia.
            - superscript [ref=e769]:
              - link "[126]" [ref=e770] [cursor=pointer]:
                - /url: "#cite_note-:0-126"
            - text: Access to some special educational resources and funding is contingent upon having a diagnosis of dyslexia.
            - superscript [ref=e771]:
              - link "[126]" [ref=e772] [cursor=pointer]:
                - /url: "#cite_note-:0-126"
            - text: As a result, when
            - link "Staffordshire" [ref=e773] [cursor=pointer]:
              - /url: /wiki/Staffordshire
            - text: and
            - link "Warwickshire" [ref=e774] [cursor=pointer]:
              - /url: /wiki/Warwickshire
            - text: proposed in 2018 to teach reading to all children with reading difficulties, using techniques proven to be successful for most children with a diagnosis of dyslexia, without first requiring the families to obtain an official diagnosis, dyslexia advocates and parents of children with dyslexia were fearful that they were losing a privileged status.
            - superscript [ref=e775]:
              - link "[126]" [ref=e776] [cursor=pointer]:
                - /url: "#cite_note-:0-126"
          - heading "Stigma and success" [level=3] [ref=e778]
          - note [ref=e779]:
            - text: "See also:"
            - link "List of people with dyslexia" [ref=e780] [cursor=pointer]:
              - /url: /wiki/List_of_people_with_dyslexia
          - paragraph [ref=e781]:
            - text: Due to the various cognitive processes that dyslexia affects and the overwhelming societal stigma around the disability, individuals with dyslexia often employ behaviors of self-stigma and perfectionistic self-presentation in order to cope with their disability.
            - superscript [ref=e782]:
              - link "[127]" [ref=e783] [cursor=pointer]:
                - /url: "#cite_note-:1-127"
            - text: The perfectionist self-presentation is when an individual attempts to present themselves as the perfect ideal image and hides any imperfections.
            - superscript [ref=e784]:
              - link "[127]" [ref=e785] [cursor=pointer]:
                - /url: "#cite_note-:1-127"
            - text: This behavior presents serious risk as it often results in mental health issues and refusal to seek help for their disability.
            - superscript [ref=e786]:
              - link "[127]" [ref=e787] [cursor=pointer]:
                - /url: "#cite_note-:1-127"
          - heading "Research" [level=2] [ref=e789]
          - note [ref=e790]:
            - text: "Further information:"
            - link "Dyslexia research" [ref=e791] [cursor=pointer]:
              - /url: /wiki/Dyslexia_research
          - figure "Writing systems" [ref=e792]:
            - link [ref=e793] [cursor=pointer]:
